#cloud-config
# Hetzner box bootstrap for the ET:Legacy web port.
# Passed as `userData` from the helja.la Pulumi stack (hcloud.Server).
#
# Before applying, substitute the placeholders:
#   __PINNED_SHA__   commit of harzzn/etlegacy@web the wasm client was built from
#                    (client paks in R2 and this server build MUST be the same
#                    mod build, or the server rejects clients on checksum)
#   __CF_DNS_TOKEN__ Cloudflare API token scoped to the helja.la zone DNS edit
#                    (Caddy DNS-01; keeps port 80 closed)
#
# First boot compiles the native server (~10-15 min). cloud-init runs once;
# for re-provisions, snapshot the image after build or run these steps over SSH.

package_update: true
packages:
  - build-essential
  - cmake
  - git
  - curl
  - rsync
  - debian-keyring
  - debian-archive-keyring
  - apt-transport-https

users:
  - name: etweb
    system: true
    home: /opt/et-web
    shell: /usr/sbin/nologin

write_files:
  - path: /etc/et-web/cf-dns.env
    permissions: '0600'
    content: |
      CF_DNS_TOKEN=__CF_DNS_TOKEN__

  - path: /etc/systemd/system/etlded.service
    content: |
      [Unit]
      Description=ET:Legacy dedicated server (web port)
      After=network.target
      [Service]
      Type=simple
      User=etweb
      WorkingDirectory=/opt/et-web/server
      ExecStart=/opt/et-web/server/etlded \
        +set fs_basepath /opt/et-web/server \
        +set fs_homepath /opt/et-web/server/home \
        +set fs_game legacy +set dedicated 2 +set net_port 27960 \
        +set sv_pure 0 +set sv_allowDownload 0 \
        +set sv_hostname "^1ET ^7Web ^1//^7 play in your browser" \
        +set g_doWarmup 1 +exec server.cfg +map radar
      Restart=always
      RestartSec=5
      CPUWeight=200
      MemoryMax=2G
      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/et-proxy.service
    content: |
      [Unit]
      Description=WebSocket to UDP proxy for ET:Legacy web clients
      After=network.target etlded.service
      [Service]
      Type=simple
      User=etweb
      ExecStart=/usr/bin/node /opt/et-web/proxy/proxy.js --host 127.0.0.1 --listen 27970 --target 127.0.0.1:27960
      Restart=always
      RestartSec=3
      MemoryMax=512M
      [Install]
      WantedBy=multi-user.target

  - path: /etc/caddy/Caddyfile
    content: |
      {
        email admin@helja.la
      }
      et.helja.la {
        root * /opt/et-web/web
        file_server
        encode zstd gzip
        handle /net { reverse_proxy 127.0.0.1:27970 }
        @big path *.pk3 *.wasm
        header @big Cache-Control "public, max-age=604800"
        header /manifest.json Cache-Control "no-cache"
        header /etl.js Cache-Control "no-cache"
        tls { dns cloudflare {env.CF_DNS_TOKEN} }
      }
      net.et.helja.la {
        reverse_proxy 127.0.0.1:27970
        tls { dns cloudflare {env.CF_DNS_TOKEN} }
      }

runcmd:
  # --- node (NodeSource LTS) ---
  - curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
  - apt-get install -y nodejs

  # --- caddy WITH the cloudflare DNS plugin (xcaddy build) ---
  - curl -fsSL https://golang.org/dl/go1.22.5.linux-amd64.tar.gz | tar -C /usr/local -xz
  - /usr/local/go/bin/go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
  - /root/go/bin/xcaddy build --with github.com/caddy-dns/cloudflare --output /usr/local/bin/caddy
  - useradd --system --home /var/lib/caddy --create-home --shell /usr/sbin/nologin caddy || true
  - mkdir -p /var/lib/caddy && chown caddy:caddy /var/lib/caddy

  # --- build the native server from the pinned forks ---
  - mkdir -p /opt/et-web && cd /opt/et-web
  - git clone -b web https://github.com/harzzn/etlegacy src
  - git -C src checkout __PINNED_SHA__
  - git clone -b etweb https://github.com/harzzn/gl4es tools/gl4es
  - cd /opt/et-web && cmake -S src -B build-server -DCMAKE_BUILD_TYPE=Release
      -DBUILD_SERVER=ON -DBUILD_CLIENT=OFF -DBUILD_MOD=ON
      -DBUILD_CLIENT_MOD=OFF -DBUILD_SERVER_MOD=ON -DBUNDLED_LIBS=ON
      -DFEATURE_OMNIBOT=OFF -DINSTALL_EXTRA=OFF -DENABLE_MULTI_BUILD=OFF
      -DFEATURE_AUTOUPDATE=OFF -DFEATURE_TRACKER=OFF
  - cmake --build /opt/et-web/build-server -j$(nproc)

  # --- server runtime dir ---
  - cd /opt/et-web && mkdir -p server/etmain server/legacy server/home web proxy
  - cp build-server/etlded server/
  - cp build-server/legacy/qagame.mp.*.so server/legacy/
  # etmain paks from the etlegacy mirror (not in any repo; licensing)
  - for f in mp_bin pak0 pak1 pak2; do curl -sfo "/opt/et-web/server/etmain/$f.pk3" "https://mirror.etlegacy.com/etmain/$f.pk3"; done
  # legacy pk3 (built above, matching mod) hardlinked for the server
  - ln -f /opt/et-web/build-server/legacy/legacy_*.pk3 /opt/et-web/server/legacy/
  # proxy from the et-web tree (already cloned via the src checkout's tools? no -
  # fetch the proxy from the et-web repo)
  - curl -sfo /opt/et-web/proxy/proxy.js https://raw.githubusercontent.com/harzzn/et-web/main/tools/proxy/proxy.js
  - cd /opt/et-web/proxy && npm init -y >/dev/null && npm i --omit=dev ws
  - |
    cat > /opt/et-web/server/server.cfg <<'CFG'
    set rconpassword "CHANGE_ME"
    set sv_maxclients 24
    set sv_fps 20
    set sv_maxRate 45000
    CFG

  # --- caddy systemd unit ---
  - |
    cat > /etc/systemd/system/caddy.service <<'UNIT'
    [Unit]
    Description=Caddy
    After=network.target
    [Service]
    User=caddy
    EnvironmentFile=/etc/et-web/cf-dns.env
    ExecStart=/usr/local/bin/caddy run --config /etc/caddy/Caddyfile
    Restart=always
    AmbientCapabilities=CAP_NET_BIND_SERVICE
    [Install]
    WantedBy=multi-user.target
    UNIT

  - chown -R etweb:etweb /opt/et-web
  - chown caddy:caddy /etc/caddy/Caddyfile
  - systemctl daemon-reload
  - systemctl enable --now etlded et-proxy caddy

final_message: "ET web box ready after $UPTIME s. Now run deploy/release.sh from et-web to push the shell + paks."
